services:
  - type: web
    name: nsu-audit-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: nsu-db
      mountPath: /opt/render/project/src
      sizeGB: 1
